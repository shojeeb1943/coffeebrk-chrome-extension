<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab — CoffeeBrk</title>
  <meta name="description" content="Your personalized new tab with search and the latest news from CoffeeBrk.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <!-- ===== TOP BAR ===== -->
  <header class="top-bar">
    <div class="brand">
      <img src="icons/icon-48.png" alt="CoffeeBrk" class="brand-icon">
      <span class="brand-name">coffeebrk</span>
    </div>
    <span id="greeting" class="greeting"></span>
  </header>

  <!-- ===== HERO / SEARCH ===== -->
  <section class="hero">
    <form id="search-form" class="search-box" action="https://www.google.com/search" method="GET" autocomplete="off">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" name="q" placeholder="Search with Google" autofocus>
    </form>
  </section>

  <!-- ===== QUICK ACCESS ===== -->
  <section class="shortcuts">
    <a href="https://mail.google.com" class="shortcut" title="Gmail">
      <div class="shortcut-icon" style="background:linear-gradient(135deg,#EA4335,#FBBC05)">

      </div>

  </section>

  <!-- ===== CATEGORY PILLS ===== -->
  <section class="category-bar">
    <button class="cat-pill active" data-category="">All</button>
  </section>

  <!-- ===== NEWS GRID ===== -->
  <section class="news-section">
    <div id="news-grid" class="news-grid"></div>
    <div id="loader" class="loader" style="display:none">
      <div class="spinner"></div>
      <span>Loading more stories…</span>
    </div>
    <div id="empty-state" class="empty-state" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V9a2 2 0 012-2h2a2 2 0 012 2v9a2 2 0 01-2 2h-2z"/></svg>
      <h3>No stories yet</h3>
      <p>Check back later for the latest news from CoffeeBrk.</p>
    </div>
    <div id="error-state" class="error-state" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <h3>Couldn't load stories</h3>
      <p>We'll try again shortly.</p>
      <button id="retry-btn" class="retry-btn">Retry</button>
    </div>
  </section>

  <footer class="footer">
    <span>Powered by <a href="https://app.coffeebrk.ai" target="_blank">coffeebrk.ai</a></span>
  </footer>

  <script src="newtab.js"></script>
</body>
</html>
